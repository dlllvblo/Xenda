<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Mapa General Xenda
    </title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    >

    <style>

        body {

            margin: 0;

            font-family: Arial;
        }

        #mapa {

            width: 100%;

            height: 100vh;
        }

    </style>

</head>

<body>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

    const mapa = L.map('mapa').setView(
        [23.6345, -102.5528],
        5
    );

    L.tileLayer(

        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

        {
            attribution:
                '&copy; OpenStreetMap contributors'
        }

    ).addTo(mapa);

</script>

{% for r in registros %}

<script>

    L.circleMarker(

    [

        Number('{{ r.latitud }}'),

        Number('{{ r.longitud }}')

    ],

    {

        radius: 5,

        color: '{{"#e53935" if r.tramo == "TAP" else "#8e24aa" if r.tramo == "TMQ" else "#3949ab" if r.tramo == "TQI" else "#1e88e5" if r.tramo == "TSNL" else "#00897b" if r.tramo == "TQSLP" else "#43a047" if r.tramo == "TSLPS" else "#fdd835" if r.tramo == "TMLM" else "#fb8c00" if r.tramo == "TIGDL" else "#616161"}}',

            fillColor: '{{"#ef5350" if r.tramo == "TAP" else "#ab47bc" if r.tramo == "TMQ" else "#5c6bc0" if r.tramo == "TQI" else "#42a5f5" if r.tramo == "TSNL" else "#26a69a" if r.tramo == "TQSLP" else "#66bb6a" if r.tramo == "TSLPS" else "#ffee58" if r.tramo == "TMLM" else "#ffa726" if r.tramo == "TIGDL" else "#9e9e9e"}}',

        fillOpacity: 0.6,

        weight: 1

    }

)

.addTo(mapa)

.bindPopup(

    `
    <b>Usuario:</b>
    <b>{{ r.usuario }}</b><br>

    <b>Actividad:</b>
    {{ r.actividad }}<br>

    <b>Tramo:</b>
    {% if r.tramo == 'TAP' %}
        AIFA-PACHUCA
    {% elif r.tramo == 'TMQ' %}
        MÉXICO-QUERÉTARO
    {% elif r.tramo == 'TQI' %}
        QUERÉTARO-IRAPUATO
    {% elif r.tramo == 'TSNL' %}
        SAN LUIS-NUEVO LEÓN
    {% elif r.tramo == 'TQSLP' %}
        QUERÉTARO-SAN LUIS POTOSÍ
    {% elif r.tramo == 'TSLPS' %}
        SALTILLO-SAN LUIS POTOSÍ
    {% elif r.tramo == 'TMLM' %}
        MAZATLÁN-LOS MOCHIS
    {% elif r.tramo == 'TIGDL' %}
        IRAPUATO-GUADALAJARA
    {% else %}
        {{ r.tramo }}
    {% endif %}<br>

    <b>Núcleo Agrario:</b>
    {{ r.nucleo }}<br>

    <b>Estado GIS:</b>
    {{ r.estado_geo }}    
    `
);

</script>

{% endfor %}

</body>

</html>

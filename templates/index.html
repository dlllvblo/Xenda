<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>XENDA</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family: Arial, Helvetica, sans-serif;

            background:
                linear-gradient(
                    rgba(248,245,239,0.95),
                    rgba(248,245,239,0.95)
                ),
                url('https://www.gob.mx/cms/uploads/image/file/597445/pleca_gobierno.png');

            background-size: cover;

            min-height:100vh;

            color:#333;

        }

        .topbar{

            width:100%;

            background:white;

            border-bottom:4px solid rgb(105,27,50);

            padding:20px 40px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

        }

        .top-left{

            display:flex;

            align-items:center;

            gap:25px;

        }

        .top-left img{

            height:80px;

        }

        .top-right img{

            height:80px;

        }

        .hero{

            width:100%;

            display:flex;

            justify-content:center;

            align-items:center;

            flex-direction:column;

            padding-top:60px;

            padding-bottom:60px;

        }

        .xenda-title{

            font-size:120px;

            font-weight:bold;

            color:rgb(105,27,50);

            letter-spacing:6px;

            margin-bottom:10px;

        }

        .subtitle{

            font-size:30px;

            color:rgb(0,74,62);

            text-align:center;

            max-width:700px;

            line-height:1.3;

            margin-bottom:40px;

            font-weight:bold;

        }

        .divider{

            width:600px;

            height:2px;

            background:rgb(188,148,73);

            margin-bottom:40px;

            position:relative;

        }

        .divider::after{

            content:"";

            position:absolute;

            width:24px;

            height:24px;

            background:rgb(188,148,73);

            left:50%;

            top:50%;

            transform:translate(-50%, -50%) rotate(45deg);

            border-radius:4px;

        }

        .login-card{

            width:100%;

            max-width:520px;

            background:white;

            border-radius:24px;

            padding:40px;

            box-shadow:0 10px 30px rgba(0,0,0,0.12);

        }

        .login-card h2{

            text-align:center;

            color:rgb(105,27,50);

            margin-bottom:30px;

            font-size:38px;

        }

        .input-group{

            margin-bottom:20px;

        }

        .input-group input{

            width:100%;

            padding:18px;

            border-radius:12px;

            border:1px solid #d8d8d8;

            font-size:18px;

            background:#fafafa;

        }

        .input-group input:focus{

            outline:none;

            border:1px solid rgb(105,27,50);

            background:white;

        }

        .btn{

            width:100%;

            padding:18px;

            border:none;

            border-radius:14px;

            background:linear-gradient(
                90deg,
                rgb(105,27,50),
                rgb(145,25,60)
            );

            color:white;

            font-size:22px;

            font-weight:bold;

            cursor:pointer;

            transition:0.2s;

        }

        .btn:hover{

            transform:translateY(-2px);

            opacity:0.95;

        }

        .flash{

            background:#ffe4e6;

            color:#7f1d1d;

            padding:15px;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            font-weight:bold;

        }

        .footer{

            width:100%;

            height:28px;

            background:linear-gradient(
                90deg,
                rgb(0,74,62),
                rgb(8,92,76)
            );

            border-top:6px solid rgb(188,148,73);

            margin-top:40px;

        }

        @media(max-width:900px){

            .topbar{

                justify-content:center;

                gap:20px;

                text-align:center;

            }

            .top-left{

                flex-direction:column;

            }

            .xenda-title{

                font-size:70px;

            }

            .subtitle{

                font-size:22px;

                padding:0 20px;

            }

            .divider{

                width:80%;

            }

            .login-card{

                width:90%;

            }

        }

    </style>

</head>

<body>

    <div class="topbar">

        <div class="top-left">

            <img
                src="https://upload.wikimedia.org/wikipedia/commons/5/55/Logotipo_de_la_Secretar%C3%ADa_de_Desarrollo_Agrario%2C_Territorial_y_Urbano.svg"
            >

            <img
                src="https://upload.wikimedia.org/wikipedia/commons/7/72/RAN_logo.png"
            >

        </div>

        <div class="top-right">

            <img
                src="https://upload.wikimedia.org/wikipedia/commons/9/93/Gobierno_de_M%C3%A9xico_2024-2030.png"
            >

        </div>

    </div>

    <div class="hero">

        <div class="xenda-title">
            XENDA
        </div>

        <div class="subtitle">
            Sistema de captura para reportes de actividades en campo
        </div>

        <div class="divider"></div>

        <div class="login-card">

            <h2>
                Iniciar sesión
            </h2>

            {% with messages = get_flashed_messages() %}

                {% if messages %}

                    {% for message in messages %}

                        <div class="flash">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

            {% endwith %}

            <form method="POST">

                <div class="input-group">

                    <input
                        type="email"
                        name="correo"
                        placeholder="Correo electrónico"
                        required
                    >

                </div>

                <div class="input-group">

                    <input
                        type="password"
                        name="password"
                        placeholder="Contraseña"
                        required
                    >

                </div>

                <button class="btn" type="submit">

                    Entrar

                </button>

            </form>

        </div>

    </div>

    <div class="footer"></div>

</body>
</html>

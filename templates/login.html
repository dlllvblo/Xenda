<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login - Xenda
    </title>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;
        }

        body {

            font-family: 'Segoe UI', sans-serif;

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            background:
                linear-gradient(
                    rgba(188,148,90,0.75),
                    rgba(36,92,79,0.90)                    
                ),
                url('/static/fondo.jpeg');

            background-size: cover;

            background-position: left center;

            padding: 20px;
        }

        .login-card {

            width: 100%;

            max-width: 430px;

            background:
                rgba(255,255,255,0.30);

            backdrop-filter: blur(14px);

            border:
                1px solid rgba(255,255,255,0.25);

            border-radius: 28px;

            padding: 42px;

            box-shadow:
                0 12px 28px rgba(0,0,0,0.18);

            animation:
                fadeIn 0.6s ease;
        }

        @keyframes fadeIn {

            from {

                opacity: 0;

                transform:
                    translateY(20px);
            }

            to {

                opacity: 1;

                transform:
                    translateY(0);
            }
        }

        .logo {

            text-align: center;

            margin-bottom: 28px;
        }

        .logo h1 {

            color: #404040;

            font-size: 35px;

            letter-spacing: 3px;

            margin-bottom: 10px;
        }

        .input-group {

            margin-bottom: 22px;
        }

        label {

            display: block;

            margin-bottom: 10px;

            font-weight: 600;

            color: #374151;
        }

        input {

            width: 100%;

            padding: 16px;

            border-radius: 16px;

            border:
                1px solid rgba(255,255,255,0.35);

            background:
                rgba(255,255,255,0.75);

            font-size: 15px;

            transition: 0.2s ease;
        }

        input:focus {

            outline: none;

            border-color: #9f2241;

            background: white;

            box-shadow:
                0 0 0 4px rgba(159,34,65,0.15);
        }

        .login-btn {

            width: 100%;

            padding: 16px;

            border: none;

            border-radius: 18px;

            background:
                linear-gradient(
                    135deg,
                    #6E152E,
                    #a42145
                );

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.2s ease;

            box-shadow:
                0 10px 22px rgba(159,34,65,0.25);
        }

        .login-btn:hover {

            transform:
                translateY(-2px);

            box-shadow:
                0 14px 28px rgba(159,34,65,0.35);
        }

        .error {

            background:
                rgba(220,38,38,0.12);

            color: #991b1b;

            padding: 14px;

            border-radius: 14px;

            margin-bottom: 22px;

            text-align: center;

            font-weight: bold;
        }

        @media (max-width: 768px) {

            body {

                background-size: contain;

                background-position: top center;

                background-repeat: no-repeat;

                background-color: #DEC9A2;

                padding: 16px;

                align-items: center;

                justify-content: flex-start;

                padding-top: 180px;
            }

            .login-card {

                padding: 30px;
            }

            .logo h1 {

                font-size: 30px;

                line-height: 1.2;
            }

        }

    </style>

</head>

<body>

    <div class="login-card">

        <div class="logo">

            <h1>
                Dirección General Territorial 
            </h1>

        </div>

        {% if error %}

            <div class="error">

                {{ error }}

            </div>

        {% endif %}

        <form method="POST">

            <div class="input-group">

                <label>
                    Correo de Gmail
                </label>

                <input
                    type="email"
                    name="correo"
                    required
                    placeholder="Ingrese su correo"
                >

            </div>

            <div class="input-group">

                <label>
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    required
                    placeholder="Ingrese contraseña"
                >

            </div>

            <button
                type="submit"
                class="login-btn"
            >

                INICIAR SESIÓN

            </button>

        </form>

    </div>

</body>

</html>
